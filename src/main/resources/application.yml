spring:
  application:
    name: hotel-search
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: dd/MM/yyyy
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotelsearch}
    username: ${DB_USER:hotelsearch}
    password: ${DB_PASS:hotelsearch}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: hotel-search-group
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      searches: ${KAFKA_TOPIC_SEARCHES:hotel_availability_searches}

server:
  port: 8080
